<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>クッキー缶 ☁️ ふわまると</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg1: #F6ECDC;
    --bg2: #FBF5EC;
    --card: #FFFFFF;
    --text: #5A4634;
    --sub: #A8917A;
    --sweet: #F2B05E;       /* あまいクッキー */
    --sweet-soft: #FBE8CC;
    --bitter: #8C6647;      /* にがいクッキー */
    --bitter-soft: #E2D3C4;
    --accent: #E59A48;
    --tin: #D98C5F;
    --tin-deep: #B86F45;
    --tin-lid: #C97B4E;
    --shadow: 0 8px 28px rgba(180,120,70,0.22);
    --radius: 26px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Zen Maru Gothic','Hiragino Maru Gothic ProN','BIZ UDGothic',sans-serif;
    background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 70%);
    min-height: 100vh; color: var(--text);
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px 110px;
  }
  .wrap { width: 100%; max-width: 410px; }
  h1 { font-size: 19px; font-weight: 700; text-align: center; margin: 0 0 2px; }
  .tagline { text-align:center; font-size: 12.5px; color: var(--sub); margin: 0 0 16px; }
  button { font-family: inherit; cursor: pointer; border: none; }

  /* 缶 */
  .tin-area { text-align:center; }
  .eater { display:inline-block; transition: transform .2s; }
  .eater.munch { animation: munch .5s ease; }
  @keyframes munch { 0%,100%{transform:scale(1)} 30%{transform:scale(1.12) rotate(-4deg)} 60%{transform:scale(0.96)} }
  @media (prefers-reduced-motion: reduce){ .eater.munch{animation:none} }

  .counts { display:flex; justify-content:center; gap: 14px; margin: 10px 0 4px; }
  .count-chip {
    display:flex; align-items:center; gap:7px;
    background: var(--card); border-radius: 999px;
    padding: 8px 16px; font-size: 15px; font-weight: 700;
    box-shadow: var(--shadow);
  }
  .count-chip .num { font-size: 18px; }
  .dot { width: 13px; height: 13px; border-radius: 50%; }
  .dot.sweet { background: var(--sweet); }
  .dot.bitter { background: var(--bitter); }

  /* 缶ビジュアル(中身が見える) */
  .jar {
    position: relative; width: 230px; height: 200px; margin: 8px auto 0;
  }
  .jar-lid {
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width: 210px; height: 30px; background: var(--tin-lid);
    border-radius: 14px 14px 8px 8px; z-index: 3;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.08);
  }
  .jar-lid::after {
    content:""; position:absolute; top:9px; left:50%; transform:translateX(-50%);
    width: 60px; height: 7px; background: rgba(255,255,255,0.4); border-radius: 4px;
  }
  .jar-body {
    position:absolute; top:24px; left:50%; transform:translateX(-50%);
    width: 196px; height: 172px;
    background: linear-gradient(160deg, var(--tin) 0%, var(--tin-deep) 100%);
    border-radius: 14px 14px 26px 26px; overflow:hidden;
    box-shadow: var(--shadow); z-index: 2;
  }
  .jar-window {
    position:absolute; top:30px; left:18px; right:18px; bottom:18px;
    background: rgba(255,250,243,0.92); border-radius: 12px;
    padding: 10px; display:flex; flex-wrap:wrap; align-content:flex-end;
    gap: 6px; overflow:hidden;
  }
  .jar-label {
    position:absolute; top:7px; left:0; right:0; text-align:center;
    font-size: 11px; font-weight:700; color: #fff; z-index: 1; letter-spacing: 1px;
  }
  .cookie {
    width: 26px; height: 26px; border-radius: 50%;
    display:flex; align-items:center; justify-content:center; font-size: 14px;
    animation: drop .4s ease;
  }
  @keyframes drop { 0%{transform:translateY(-14px);opacity:0} 100%{transform:translateY(0);opacity:1} }
  .cookie.sweet { background: var(--sweet); box-shadow: inset 0 -3px 0 rgba(0,0,0,0.08); }
  .cookie.bitter { background: var(--bitter); box-shadow: inset 0 -3px 0 rgba(0,0,0,0.12); }
  .jar-empty { font-size: 12px; color: var(--sub); text-align:center; width:100%; align-self:center; }

  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px 18px; margin-top: 18px;
  }
  .card-head { display:flex; align-items:center; margin-bottom: 10px; }
  .card-head h2 { margin:0; font-size: 16px; }
  .seg { display:flex; gap: 8px; margin: 6px 0 12px; }
  .seg button {
    flex:1; border-radius: 14px; padding: 11px; font-size: 13.5px; font-weight:700;
    background: #F3EEE7; color: var(--sub);
  }
  .seg button.on.sweet { background: var(--sweet); color:#fff; }
  .seg button.on.bitter { background: var(--bitter); color:#fff; }
  input[type=text] {
    width:100%; border:2px solid #EFE6DA; border-radius: 14px;
    padding: 12px 14px; font-size: 15px; font-family:inherit; color:var(--text);
    outline:none; background:#fff;
  }
  input[type=text]:focus { border-color: var(--accent); }
  .btn-primary {
    width:100%; border-radius: 16px; padding: 13px; font-size: 15px; font-weight:700;
    color:#fff; background: var(--accent); box-shadow: var(--shadow); margin-top: 12px;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background:#E2D3C4; box-shadow:none; }

  .task {
    display:flex; align-items:center; gap:10px;
    background:#FBF6EF; border-radius:14px; padding:11px 13px; margin-bottom:9px;
  }
  .task .tcookie { width:24px; height:24px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:13px; }
  .task .tcookie.sweet { background: var(--sweet); }
  .task .tcookie.bitter { background: var(--bitter); }
  .task .ttext { flex:1; font-size:14.5px; line-height:1.5; }
  .task .eat {
    background: var(--accent); color:#fff; border-radius:999px;
    padding:7px 14px; font-size:12.5px; font-weight:700; white-space:nowrap;
  }
  .task .del { background:none; color:var(--sub); font-size:16px; padding:2px 4px; }
  .empty { color:var(--sub); font-size:14px; text-align:center; padding:18px 0; line-height:1.8; }

  .nav { position: fixed; bottom:16px; left:0; right:0; display:flex; justify-content:center; gap:10px; }
  .nav button { background:var(--card); color:var(--text); border-radius:999px;
    padding:11px 20px; font-size:14px; font-weight:700; box-shadow:var(--shadow); }
  .nav button.active { background:var(--accent); color:#fff; }

  details { margin-top: 14px; }
  summary { font-size:12px; color:var(--sub); cursor:pointer; text-align:center; list-style:none; }
  summary::-webkit-details-marker { display:none; }
  .hint { font-size:11.5px; color:var(--sub); }
  textarea { width:100%; border:2px solid #EFE6DA; border-radius:12px; padding:10px;
    font-family:inherit; font-size:11px; resize:none; color:var(--text); }
  .toast {
    position: fixed; bottom: 78px; left:50%; transform:translateX(-50%);
    background: var(--text); color:#fff; padding:10px 18px; border-radius:999px;
    font-size:13px; font-weight:700; opacity:0; transition:opacity .3s; pointer-events:none; z-index:10;
  }
  .toast.show { opacity:0.95; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="nav" id="nav"></div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   クッキー缶 — やりたいこと=あまいクッキー / やるべきこと=にがいクッキー
   タスク完了 → ふわまるがもぐもぐ → 缶から1つ減る
   缶の中身(甘い/苦いの数と割合)が可視化される のが主役
   AIなし / localStorage / 単一ファイル
   ========================================================= */
var KEY = "cookie-tin-data-v1";

function load() {
  try {
    var d = JSON.parse(localStorage.getItem(KEY));
    if (!d) return { tasks: [], eater: "fuwamaru", eaten: 0 };
    if (!d.tasks) d.tasks = [];
    if (!d.eater) d.eater = "fuwamaru";
    if (typeof d.eaten !== "number") d.eaten = 0;
    return d;
  } catch (e) { return { tasks: [], eater: "fuwamaru", eaten: 0 }; }
}
function save() { try { localStorage.setItem(KEY, JSON.stringify(data)); return true; } catch(e){ return false; } }

var data = load();
var screen = "tin";      // tin | add
var addFlavor = "sweet"; // sweet | bitter

/* ---------- キャラSVG ---------- */
function fuwamaru(munch, size) {
  size = size || 110;
  var mouth = munch
    ? '<ellipse cx="60" cy="62" rx="7" ry="6" fill="#E08CA2"/>'
    : '<path d="M54 60 q6 6 12 0" stroke="#E08CA2" stroke-width="2.5" fill="none" stroke-linecap="round"/>';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 120 110">'
   + '<ellipse cx="42" cy="22" rx="10" ry="17" fill="#fff" stroke="#DCE9F2" stroke-width="2"/>'
   + '<ellipse cx="78" cy="22" rx="10" ry="17" fill="#fff" stroke="#DCE9F2" stroke-width="2"/>'
   + '<ellipse cx="42" cy="24" rx="5" ry="10" fill="#F8DCE4"/><ellipse cx="78" cy="24" rx="5" ry="10" fill="#F8DCE4"/>'
   + '<path d="M60 18 C84 18 102 32 102 56 C110 58 112 70 104 74 C104 92 86 102 60 102 C34 102 16 92 16 74 C8 70 10 58 18 56 C18 32 36 18 60 18 Z" fill="#fff" stroke="#DCE9F2" stroke-width="2"/>'
   + '<text x="54" y="38" font-size="11" fill="#F5C97B">★</text>'
   + '<circle cx="49" cy="51" r="3.2" fill="#5A6B78"/><circle cx="71" cy="51" r="3.2" fill="#5A6B78"/>'
   + mouth
   + '<ellipse cx="38" cy="60" rx="6" ry="4" fill="#F8C9D5"/><ellipse cx="82" cy="60" rx="6" ry="4" fill="#F8C9D5"/>'
   + '</svg>';
}
function eaterSvg(munch, size) {
  return fuwamaru(munch, size);
}

/* ---------- 描画 ---------- */
var app = document.getElementById("app");
var nav = document.getElementById("nav");
var toastEl = document.getElementById("toast");

function counts() {
  var s = 0, b = 0;
  for (var i=0;i<data.tasks.length;i++){ data.tasks[i].flavor==="bitter"?b++:s++; }
  return { sweet:s, bitter:b, total:s+b };
}

function render(){ screen==="tin" ? renderTin() : renderAdd(); renderNav(); }

function renderTin() {
  var c = counts();
  // 缶の中身(最大40個まで表示)
  var jarInner = "";
  if (c.total === 0) {
    jarInner = '<div class="jar-empty">缶はからっぽ。<br>クッキーを入れてみよう🍪</div>';
  } else {
    var dots = [];
    for (var i=0;i<data.tasks.length && i<40;i++){
      var f = data.tasks[i].flavor;
      dots.push('<div class="cookie '+f+'">'+(f==="bitter"?"●":"●")+'</div>');
    }
    jarInner = dots.join("");
  }

  app.innerHTML = ''
   + '<h1>クッキー缶</h1>'
   + '<p class="tagline">やりたいこと も やるべきこと も、おなじ缶のなかに🍪</p>'
   + '<div class="tin-area">'
   + '  <span class="eater" id="eater">'+eaterSvg(false,118)+'</span>'
   + '  <div class="counts">'
   + '    <div class="count-chip"><span class="dot sweet"></span>あまい <span class="num">'+c.sweet+'</span></div>'
   + '    <div class="count-chip"><span class="dot bitter"></span>にがい <span class="num">'+c.bitter+'</span></div>'
   + '  </div>'
   + '  <div class="jar">'
   + '    <div class="jar-lid"></div>'
   + '    <div class="jar-body"><div class="jar-label">COOKIE</div>'
   + '      <div class="jar-window" id="jarWindow">'+jarInner+'</div>'
   + '    </div>'
   + '  </div>'
   + '</div>'
   + '<div class="card">'
   + '  <div class="card-head"><h2>🍪 缶のなかみ</h2></div>'
   + taskList()
   + '</div>'
   + eaterPickerBlock();

  bindTaskButtons();
  bindEaterPicker();
}

function taskList() {
  if (data.tasks.length === 0)
    return '<div class="empty">まだ クッキーがないよ。<br>「いれる」から ひとつ ついかしてね🍪</div>';
  var html = "";
  for (var i=0;i<data.tasks.length;i++){
    var t = data.tasks[i];
    html += '<div class="task">'
      + '<span class="tcookie '+t.flavor+'">'+(t.flavor==="bitter"?"🍫":"🍪")+'</span>'
      + '<span class="ttext">'+escapeHtml(t.text)+'</span>'
      + '<button class="eat" data-eat="'+t.id+'">たべる</button>'
      + '<button class="del" data-del="'+t.id+'" aria-label="けす">×</button>'
      + '</div>';
  }
  return html;
}

function eaterPickerBlock() {
  return '<details><summary>⚙️ バックアップ・ふくげん</summary>'
   + '<div style="margin-top:12px;">'
   + '<p class="hint" style="margin:4px 0 4px;">↓バックアップ(コピーしてメモに)</p>'
   + '<textarea readonly id="exp" style="height:54px;">'+escapeHtml(JSON.stringify(data))+'</textarea>'
   + '<p class="hint" style="margin:10px 0 4px;">↓もどす(はって よみこむ)</p>'
   + '<textarea id="imp" style="height:46px;" placeholder="{...}"></textarea>'
   + '<button class="btn-primary" id="impBtn" style="margin-top:8px;">よみこむ</button>'
   + '<span id="impMsg" class="hint"></span>'
   + '</div></details>';
}

function renderAdd() {
  app.innerHTML = ''
   + '<h1>クッキーを いれる</h1>'
   + '<p class="tagline">どんな クッキーかな?🍪</p>'
   + '<div class="card">'
   + '  <div class="seg">'
   + '    <button id="segSweet" class="'+(addFlavor==="sweet"?"on sweet":"")+'">🍪 あまい<br><span style="font-size:11px;font-weight:400;">やりたいこと</span></button>'
   + '    <button id="segBitter" class="'+(addFlavor==="bitter"?"on bitter":"")+'">🍫 にがい<br><span style="font-size:11px;font-weight:400;">やるべきこと</span></button>'
   + '  </div>'
   + '  <input type="text" id="taskText" placeholder="なにを する?" />'
   + '  <button class="btn-primary" id="addBtn" disabled>缶に いれる</button>'
   + '</div>';

  document.getElementById("segSweet").addEventListener("click", function(){ addFlavor="sweet"; renderAdd(); });
  document.getElementById("segBitter").addEventListener("click", function(){ addFlavor="bitter"; renderAdd(); });
  var input = document.getElementById("taskText");
  var addBtn = document.getElementById("addBtn");
  input.addEventListener("input", function(){ addBtn.disabled = !input.value.trim(); });
  input.focus();
  addBtn.addEventListener("click", function(){
    if (!input.value.trim()) return;
    data.tasks.push({ id: Date.now(), text: input.value.trim(), flavor: addFlavor });
    save();
    screen = "tin"; render();
    showToast(addFlavor==="bitter" ? "にがいクッキーを いれたよ🍫" : "あまいクッキーを いれたよ🍪");
  });
}

function bindTaskButtons() {
  var eats = document.querySelectorAll("[data-eat]");
  eats.forEach(function(btn){
    btn.addEventListener("click", function(){
      var id = parseInt(btn.getAttribute("data-eat"));
      var t = data.tasks.find(function(x){return x.id===id;});
      var flavor = t ? t.flavor : "sweet";
      // もぐもぐ演出
      var eater = document.getElementById("eater");
      if (eater) { eater.innerHTML = eaterSvg(true,118); eater.classList.add("munch"); }
      showToast(flavor==="bitter" ? "にがいの、よく たべたね…えらい!🍫" : "あまいの、おいしかったね🍪");
      setTimeout(function(){
        data.tasks = data.tasks.filter(function(x){return x.id!==id;});
        data.eaten++;
        save(); render();
      }, 480);
    });
  });
  var dels = document.querySelectorAll("[data-del]");
  dels.forEach(function(btn){
    btn.addEventListener("click", function(){
      var id = parseInt(btn.getAttribute("data-del"));
      data.tasks = data.tasks.filter(function(x){return x.id!==id;});
      save(); render();
    });
  });
}

function bindEaterPicker() {
  var impBtn = document.getElementById("impBtn");
  if (impBtn) impBtn.addEventListener("click", function(){
    var msg = document.getElementById("impMsg");
    try {
      var p = JSON.parse(document.getElementById("imp").value);
      if (!p || !Array.isArray(p.tasks)) throw new Error();
      data = p; if(!data.eater) data.eater="fuwamaru"; if(typeof data.eaten!=="number") data.eaten=0;
      save(); render();
    } catch(e){ msg.textContent = " よみこめなかった…"; }
  });
}

function renderNav() {
  nav.innerHTML = ''
   + '<button id="navTin" class="'+(screen==="tin"?"active":"")+'">🍪 缶</button>'
   + '<button id="navAdd" class="'+(screen==="add"?"active":"")+'">＋ いれる</button>';
  document.getElementById("navTin").addEventListener("click", function(){ screen="tin"; render(); });
  document.getElementById("navAdd").addEventListener("click", function(){ screen="add"; render(); });
}

var toastTimer;
function showToast(msg){
  toastEl.textContent = msg; toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ toastEl.classList.remove("show"); }, 1800);
}

function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

render();
</script>
</body>
</html>
